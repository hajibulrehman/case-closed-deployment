databases:
  - name: case-closed-db
    plan: free
    databaseName: caseclosed
    user: caseclosed

services:
  - type: web
    name: case-closed-app
    runtime: node
    plan: free
    buildCommand: >-
      cd frontend && npm install && npm run build &&
      cd ../backend && npm install &&
      npx prisma generate &&
      npx prisma migrate deploy
    startCommand: node backend/src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: case-closed-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
