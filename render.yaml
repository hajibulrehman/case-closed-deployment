databases:
  - name: case-closed-db
    plan: free
    databaseName: caseclosed
    user: caseclosed

services:
  # ── Backend API (Node/Express) ─────────────────────────────────────────────
  - type: web
    name: case-closed-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: case-closed-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true        # Render generates a strong random value
      - key: CORS_ORIGIN
        sync: false                # Set manually in the Render dashboard after deploying frontend
      - key: NODE_ENV
        value: production

  # ── Frontend (React/Vite static site) ─────────────────────────────────────
  - type: web
    name: case-closed-frontend
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      # Send all routes to index.html so React Router handles them client-side
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: case-closed-backend
          type: web
          property: host           # Render fills in the backend's public URL
