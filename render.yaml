databases:
  - name: case-closed-db
    plan: free
    databaseName: caseclosed
    user: caseclosed

services:
  # Single web service — Express serves both the API and the React frontend
  - type: web
    name: case-closed-app
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: case-closed-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
