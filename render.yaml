databases:
  - name: case-closed-db
    plan: free
    databaseName: caseclosed
    user: caseclosed

services:
  # ── Backend API — Node/Express Web Service ────────────────────────────────
  - type: web
    name: case-closed-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: case-closed-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      # After first deploy, set this to your frontend URL, e.g.:
      # https://case-closed-frontend.onrender.com
      - key: CORS_ORIGIN
        sync: false

  # ── Frontend — React/Vite Static Site ────────────────────────────────────
  - type: static
    name: case-closed-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      # Rewrite all paths to index.html so React Router works on direct load/refresh
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set this to your backend URL after the backend service is deployed, e.g.:
      # https://case-closed-backend.onrender.com
      - key: VITE_API_URL
        sync: false
